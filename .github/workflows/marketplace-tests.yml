name: Marketplace Tests

on:
  push:
    branches: [feat/marketplace-analytics, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:market
      - run: npm run test:market-coexist
      - run: npm run test:market-edge
