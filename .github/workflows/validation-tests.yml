name: Slot Validation Tests

on:
  push:
    branches: [feat/slot-validation, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:validation
      - run: npm run test:validation-rules
      - run: npm run test:validation-edge
