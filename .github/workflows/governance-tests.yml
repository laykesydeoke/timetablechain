name: Governance Tests

on:
  push:
    branches: [feat/governance, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:governance
      - run: npm run test:gov-edge
      - run: npm run test:gov-flow
