name: Tier Tests

on:
  push:
    branches: [feat/tier-rewards, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:tiers
      - run: npm run test:tier-levels
      - run: npm run test:tier-edge
