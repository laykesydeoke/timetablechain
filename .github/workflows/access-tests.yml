name: Access Control Tests

on:
  push:
    branches: [feat/access-control, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:access
      - run: npm run test:access-roles
      - run: npm run test:access-edge
