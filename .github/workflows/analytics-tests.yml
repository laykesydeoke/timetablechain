name: Analytics Tests

on:
  push:
    branches: [feat/slot-analytics, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:analytics
      - run: npm run test:teachers
      - run: npm run test:analytics-edge
